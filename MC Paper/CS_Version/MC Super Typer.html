<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Super Typer</title>
    <style>
        :root { --primary: #ffd700; --primary-dark: #b8860b; --bg: #fffdf0; --danger: #d93025; --success: #4CAF50; --info: #2196F3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        #settings-modal { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .tables-wrapper { display: flex; flex-direction: row; gap: 20px; overflow-y: auto; margin-bottom: 15px; }
        .table-section { flex: 1; min-width: 280px; position: relative; }
        
        .table-container { border: 1px solid #eee; border-radius: 6px; max-height: 300px; overflow-y: auto; background: #fff; position: relative; }
        .table-container::-webkit-scrollbar { width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .scroll-hint { text-align: center; font-size: 0.75rem; color: #888; padding: 4px; background: #fafafa; border-top: 1px solid #eee; border-radius: 0 0 6px 6px; font-style: italic; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.9rem; }
        
        .edit-input { width: 80%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .key-input-listen { background-color: #f0f7ff; cursor: pointer; font-weight: bold; color: #007bff; border: 1px solid #007bff; }
        
        #button-container { display: flex; flex-wrap: nowrap; gap: 8px; width: 98%; max-width: 1100px; margin-bottom: 15px; justify-content: center; container-type: inline-size; }
        .btn-big { flex: 1; min-width: 40px; max-width: 150px; aspect-ratio: 1 / 1; font-size: clamp(14px, 40cqw, 48px); font-weight: 900; cursor: pointer; border: none; border-radius: 12px; background-color: var(--primary); box-shadow: 0 5px var(--primary-dark); transition: all 0.05s; touch-action: manipulation; display: flex; align-items: center; justify-content: center; }
        .btn-big:active, .btn-active { box-shadow: 0 0 var(--primary-dark); transform: translateY(5px); }
        
        #display { width: 95%; max-width: 850px; min-height: 60px; background: white; border: 3px solid #e6b800; border-radius: 10px; padding: 12px; margin-bottom: 20px; font-size: 1.2rem; word-wrap: break-word; }
        #mc-counter { width: 95%; max-width: 850px; text-align: center; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; color: #444; background: #fff9c4; padding: 12px; border-radius: 8px; line-height: 1.5; }
        
        .control-panel { display: flex; flex-direction: column; gap: 8px; width: 95%; max-width: 600px; }
        .btn-control { padding: 10px; font-size: 0.95rem; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: white; }
        .btn-voice-active { background-color: #e3f2fd; border-color: var(--info); color: var(--info); font-weight: bold; }
        
        h4 { margin: 0 0 10px 0; color: #333; border-left: 4px solid var(--primary); padding-left: 10px; }
        .btn-modal-save { background: var(--success); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        @media (max-width: 700px) { .tables-wrapper { flex-direction: column; } }
    </style>
</head>
<body>
    <button class="btn-control" style="width:95%; max-width:850px; margin-bottom:15px; font-weight:bold;" onclick="openSettings()">⌨️ Keyboard Keys Setting</button>

    <div id="modal-overlay">
        <div id="settings-modal">
            <h2 style="margin:0 0 15px 0">Settings</h2>
            <div class="tables-wrapper">
                <div class="table-section">
                    <h4>Answer Buttons</h4>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Label</th><th>Key</th><th>Del</th></tr></thead>
                            <tbody id="answer-table-body"></tbody>
                        </table>
                    </div>
                    <div class="scroll-hint">↓ Scroll for more buttons ↓</div>
                    <button class="btn-control" style="width:100%; margin-top:10px; border-style:dashed;" onclick="addNewButtonRow()">+ Add Row</button>
                </div>
                <div class="table-section">
                    <h4>System Functions</h4>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Function</th><th>Key</th></tr></thead>
                            <tbody id="system-table-body"></tbody>
                        </table>
                    </div>
                    <div class="scroll-hint">↓ Scroll for more functions ↓</div>
                </div>
            </div>
            <button class="btn-modal-save" onclick="saveAndClose()">Save & Close</button>
        </div>
    </div>

    <div id="display">No answers yet.</div>
    <div id="button-container"></div>
    <div id="mc-counter">MC No. count: Loading...</div>

    <div class="control-panel">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"><button class="btn-control" onclick="deleteLast()">Del Last</button><button class="btn-control" onclick="deleteSpecific()">Del Question (Ask)</button></div>
        <button class="btn-control" style="color:var(--danger); font-weight:bold; border-color:var(--danger);" onclick="resetAnswers()">Reset All Answers</button>
        <button class="btn-control" onclick="changeAnswer()">Change answer (Ask)</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-control" onclick="importAnswers()">Import</button><button class="btn-control" onclick="exportAnswers()">Export</button>
            <button id="toggle-voice-btn" class="btn-control" onclick="toggleLiveVoice()">say answers when typing (Close)</button><button class="btn-control" onclick="speakAllAnswers()">say answers</button>
        </div>
    </div>

    <script>
        let answers = []; let liveVoiceEnabled = false;
        let buttonConfig = [{ label: 'A', key: '1' }, { label: 'B', key: '2' }, { label: 'C', key: '3' }, { label: 'D', key: '4' }, { label: '/', key: '5' }];
        let sysConfig = { 'Delete Last': 'Backspace', 'Delete Special': '\\', 'Reset All': '=', 'Change Answer': '-', 'Import': 'Shift', 'Export': 'Enter', 'Toggle Live Voice': 'v', 'Say All Answers': 's' };

        function getEnglishNumber(n) {
            const words = ["Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen", "Twenty"];
            return n <= 20 ? words[n] : n.toString();
        }

        function toggleLiveVoice() { 
            liveVoiceEnabled = !liveVoiceEnabled; 
            const btn = document.getElementById('toggle-voice-btn'); 
            btn.innerText = `say answers when typing (${liveVoiceEnabled ? 'Open' : 'Close'})`; 
            btn.classList.toggle('btn-voice-active', liveVoiceEnabled); 
        }

        function speak(text) { 
            if (!window.speechSynthesis) return; 
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text); 
            utterance.lang = 'en-US'; utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance); 
        }

        function speakAllAnswers() { 
            if (answers.length === 0) return speak("No answers"); 
            let text = answers.map((ans, i) => {
                let num = getEnglishNumber(i + 1);
                let label = ans === '/' ? 'skip' : (ans.toUpperCase() === 'D' ? 'Dog' : ans);
                return `${num} ${label}`;
            }).join(' ... '); 
            speak(text); 
        }

        function addAnswer(val) { 
            answers.push(val); 
            updateDisplay(); 
            if (liveVoiceEnabled) { 
                let label = val === '/' ? 'skip' : (val.toUpperCase() === 'D' ? 'Dog' : val); 
                speak(`${getEnglishNumber(answers.length)} ${label}`); 
            } 
        }

        function updateCounter() { 
            const counts = {};
            buttonConfig.forEach(config => counts[config.label] = 0);
            answers.forEach(val => { if (counts.hasOwnProperty(val)) counts[val]++; else counts[val] = (counts[val] || 0) + 1; });
            const counterText = Object.keys(counts).map(key => `${key}:${counts[key]}`).join(' , ');
            document.getElementById('mc-counter').innerText = `MC No. count: ${counterText}`; 
        }

        function updateDisplay() { 
            const display = document.getElementById('display'); 
            display.innerText = answers.length === 0 ? "No answers yet." : answers.map((ans, i) => `${i + 1}.${ans}`).join(' '); 
            updateCounter(); 
        }

        function renderMainButtons() { 
            const container = document.getElementById('button-container'); 
            container.innerHTML = ''; 
            buttonConfig.forEach((config, i) => { 
                const btn = document.createElement('button'); 
                btn.id = `btn-idx-${i}`; btn.className = 'btn-big'; btn.innerText = config.label; 
                btn.onclick = () => addAnswer(config.label); 
                container.appendChild(btn); 
            }); 
        }

        function openSettings() { renderTables(); document.getElementById('modal-overlay').style.display = 'flex'; }
        function renderTables() {
            const aBody = document.getElementById('answer-table-body'); aBody.innerHTML = '';
            buttonConfig.forEach((config, i) => { aBody.innerHTML += `<tr><td><input type="text" class="edit-input a-label" value="${config.label}"></td><td><input type="text" class="edit-input a-key key-input-listen" value="${config.key}" readonly onclick="captureKey(this)"></td><td><button style="color:red; border:none; background:none; cursor:pointer;" onclick="removeConfigRow(${i})">✕</button></td></tr>`; });
            const sBody = document.getElementById('system-table-body'); sBody.innerHTML = '';
            for (let func in sysConfig) { sBody.innerHTML += `<tr><td style="text-align:left;">${func}</td><td><input type="text" class="edit-input s-key key-input-listen" data-func="${func}" value="${sysConfig[func]}" readonly onclick="captureKey(this)"></td></tr>`; }
        }

        function captureKey(input) { input.value = "..."; const listener = (e) => { e.preventDefault(); input.value = e.key === " " ? "Space" : e.key; window.removeEventListener('keydown', listener); }; window.addEventListener('keydown', listener); }
        function addNewButtonRow() { syncState(); buttonConfig.push({ label: '?', key: '' }); renderTables(); }
        function removeConfigRow(i) { syncState(); buttonConfig.splice(i, 1); renderTables(); }
        function syncState() { const aLabels = document.querySelectorAll('.a-label'); const aKeys = document.querySelectorAll('.a-key'); buttonConfig = []; aLabels.forEach((el, i) => { buttonConfig.push({ label: el.value || '?', key: aKeys[i].value }); }); const sKeys = document.querySelectorAll('.s-key'); sKeys.forEach(el => { sysConfig[el.dataset.func] = el.value; }); }
        function saveAndClose() { syncState(); renderMainButtons(); document.getElementById('modal-overlay').style.display = 'none'; updateCounter(); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal-overlay').style.display === 'flex') return;
            const pressedKey = e.key === " " ? "Space" : e.key;
            buttonConfig.forEach((config, i) => { if (pressedKey === config.key && config.key !== "") { addAnswer(config.label); const el = document.getElementById(`btn-idx-${i}`); if (el) { el.classList.add('btn-active'); setTimeout(() => el.classList.remove('btn-active'), 100); } } });
            if (pressedKey === sysConfig['Delete Last']) { e.preventDefault(); deleteLast(); }
            if (pressedKey === sysConfig['Delete Special']) deleteSpecific();
            if (pressedKey === sysConfig['Reset All']) resetAnswers();
            if (pressedKey === sysConfig['Change Answer']) changeAnswer();
            if (pressedKey === sysConfig['Import']) importAnswers();
            if (pressedKey === sysConfig['Export']) exportAnswers();
            if (pressedKey === sysConfig['Toggle Live Voice']) toggleLiveVoice();
            if (pressedKey === sysConfig['Say All Answers']) speakAllAnswers();
        });

        function deleteLast() { answers.pop(); updateDisplay(); }
        function deleteSpecific() { let num = prompt("Delete question number:"); let idx = parseInt(num) - 1; if (!isNaN(idx) && idx >= 0 && idx < answers.length) { answers.splice(idx, 1); updateDisplay(); } }
        function resetAnswers() { if (confirm("Reset all?")) { answers = []; updateDisplay(); } }
        function changeAnswer() { let num = prompt("Change question number:"); let idx = parseInt(num) - 1; if (!isNaN(idx) && idx >= 0 && idx < answers.length) { let input = prompt(`New answer for Q${num}:`, answers[idx]); if (input) { answers[idx] = input; updateDisplay(); } } }
        function importAnswers() { let raw = prompt("Format: A|B|C|"); if (raw) { answers = raw.split('|').filter(x => x.trim()).map(x => x.trim()); updateDisplay(); } }
        function exportAnswers() { if (!answers.length) return; let formatted = answers.join('|') + '|'; navigator.clipboard.writeText(formatted).then(() => alert("Copied!")); }
        
        renderMainButtons(); updateDisplay();
    </script>
</body>
</html>
