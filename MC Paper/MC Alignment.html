<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MC Scanner</title>
  <style>
    /* 全域基本樣式 */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
    }

    /* 頂部 Header 區塊 */
    header,
    .site-header {
      height: 70px !important;
      min-height: 70px !important;
      width: 100%;
      flex-shrink: 0;
    }

    /* 容器：利用 flex: 1 自動填滿剩下空間，不需 calc 計算 */
    #container {
      display: flex;
      flex-direction: row;
      width: 100vw;
      flex: 1;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* 【電腦版】左側預覽區 */
    #right {
      flex: 0 0 auto;
      aspect-ratio: 1 / 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #fff;
      border-right: 1px solid #ddd;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* 【電腦版】右側共享區：設定面板 2/3，日誌 1/3 */
    #main-right {
      flex: 1;
      display: grid;
      grid-template-rows: 2fr 1fr;
      height: 100%;
      min-height: 0;
      background-color: #e6f0ff;
      overflow: hidden;
    }

    #left {
      padding: 20px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    #bottom {
      padding: 20px;
      border-top: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ddd;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      background: #fff;
    }

    .btn-cookie {
      background-color: #f0a500;
      color: white;
      border: none;
      padding: 4px 8px;
      margin: 2px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-cookie:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .btn-clear-cookie {
      background-color: #d9534f;
    }

    /* ======================================================= */
    /* 手機直向版 RWD：高度與位置完全按照您的精確指定調校 */
    /* ======================================================= */
    @media (orientation: portrait),
    (max-aspect-ratio: 1/1) {
      #container {
        flex-direction: column;
        /* 改為垂直排列 */
        height: 100%;
      }

      /* Preview box: 寬高皆為全寬 (100vw) 的實體正方形，固定不滾動 */
      #right {
        flex: 0 0 100vw;
        width: 100vw;
        height: 100vw;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      /* 設定與日誌的包裹層：自動吃掉 (all - 70px - 100vw) 的剩餘空間 */
      #main-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        /* 讓設定與日誌垂直平分 */
        height: 100%;
        min-height: 0;
      }

      /* Setting json: 高度彈性 (50%)，內容超出可獨立滾動 */
      #left {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }

      /* Log: 高度彈性 (50%)，內容超出可獨立滾動 */
      #bottom {
        flex: 1;
        min-height: 0;
        border-top: 1px solid #ddd;
      }
    }
  </style>

</head>

<body>

  <script src="../code/js/header.js"></script>

  <div style="height: 70px;"></div>

  <div id="container">
    <div id="right">
      <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div id="main-right">

      <div style="display: flex;overflow: hidden;">
        <div id="left">
          <h3>Load Image</h3>
          <input id="fileInput" type="file" multiple><br />
          <button id="loadBtn">Load Image</button>

          <h3>Output</h3>
          <button id="saveCookieBtn" class="btn-cookie" disabled>Save cookies</button>
          <button id="clearCookieBtn" class="btn-cookie btn-clear-cookie">Clear cookies</button>
          <br />
          <br />
          <button id="downloadBtn" disabled>Download Aligned</button>
          <button id="copyBtn" disabled>Copy Aligned</button>
          <button id="copyDataUrlBtn" disabled>Copy Data URL</button>
          <br />
          <span id="copyStatus" style="font-size:0.9em;color:#333;"></span>
        </div>

        <div id="left">


          <div id="opencvImportZone" style="display: none;">
            <button class="btn-import" onclick="document.getElementById('cvFileInput').click()">匯入 OpenCV.js</button>
            <input id="cvFileInput" type="file" style="display: none;">
          </div>

          <h3>Settings</h3>
          <label>Save File:</label>
          <input id="saveFile" type="text" value="Save"><br />

          <label>Step File:</label>
          <input id="stepFile" type="text" value="Step"><br />

          <label>PositionsTxt:</label>
          <input id="positionsTxt" type="text" value="Pos"><br />

          <label>Save Pixels X:</label>
          <input id="savePixelsX" type="number" value="2480"><br />

          <label>Save Pixels Y:</label>
          <input id="savePixelsY" type="number" value="3508"><br />

          <label>Search Percent:</label>
          <input id="searchPercentBox" type="number" value="1.5" min="0.1" max="20" step="0.1"><br />

          <label>自適應純白靈敏度:</label>
          <input id="whiteSensitivityBox" type="number" value="100" min="1" max="100"><br />

          <label>Step Required:</label>
          <input id="stepRequired" type="checkbox"><br /><br />

          <label>Settings JSON:</label>
          <input id="settingsInput" type="file">
        </div>
      </div>

      <div id="bottom">
        <div style="font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #555;">Console Logs:</div>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script src="./McScaner.js"></script>
  <script>
    let cvReady = false;

    function initOpenCvHooks() {
      if (typeof cv !== 'undefined') {
        cv.onRuntimeInitialized = () => {
          cvReady = true;
          log("[INFO] OpenCV.js initialized via default path");
          document.getElementById('opencvImportZone').style.display = 'none';
          loadSavedPhotoFromStorage(); // <-- 加在這裡
        };
        if (cv.Mat) {
          cvReady = true;
          log("[INFO] OpenCV.js already ready via default path");
          document.getElementById('opencvImportZone').style.display = 'none';
          loadSavedPhotoFromStorage(); // <-- 加在這裡
        }
      } else {
        log("[WARN] OpenCV.js not found at default location. Please import manually.");
        document.getElementById('opencvImportZone').style.display = 'inline-block';
        loadSavedPhotoFromStorage(); // <-- 加在這裡
      }
    }

    document.getElementById('cvFileInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      log("[INFO] Importing manual file: " + file.name);
      const reader = new FileReader();
      reader.onload = function (event) {
        try {
          const script = document.createElement('script');
          script.text = event.target.result;

          window.cv = window.cv || {};
          window.cv.onRuntimeInitialized = () => {
            cvReady = true;
            log("[INFO] Manual OpenCV layout built and initialized successfully!");
            document.getElementById('opencvImportZone').style.display = 'none';
          };

          document.body.appendChild(script);

          setTimeout(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
              cvReady = true;
              log("[INFO] Manual OpenCV context environment initialized active.");
              document.getElementById('opencvImportZone').style.display = 'none';
            }
          }, 1000);

        } catch (err) {
          log("[ERROR] Critical failure running manual execution data buffer payload.");
        }
      };
      reader.readAsText(file);
    });

    window.addEventListener('load', () => {
      initOpenCvHooks();
    });

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let imgMat = null;
    let alignedMat = null;
    let scale = 1, offsetX = 0, offsetY = 0;
    let clicks = [];
    let refinedPoints = [];

    let settings = {
      save_file: "Save",
      step_file: "Step",
      PositionsTxt: "Pos",
      save_pixels_x: 0,
      save_pixels_y: 0,
      search_percent: 1.5,
      white_sensitivity: 100,
      StepRequired: true
    };

    function log(msg) {
      const logDiv = document.getElementById('log');
      if (logDiv) {
        logDiv.textContent += msg + "\n";
        logDiv.scrollTop = logDiv.scrollHeight;
      }
    }

    function updateSettingsFromUI() {
      settings.save_file = document.getElementById('saveFile').value;
      settings.step_file = document.getElementById('stepFile').value;
      settings.PositionsTxt = document.getElementById('positionsTxt').value;
      settings.save_pixels_x = parseInt(document.getElementById('savePixelsX').value);
      settings.save_pixels_y = parseInt(document.getElementById('savePixelsY').value);
      settings.search_percent = parseFloat(document.getElementById('searchPercentBox').value);
      settings.white_sensitivity = parseFloat(document.getElementById('whiteSensitivityBox').value);
      settings.StepRequired = document.getElementById('stepRequired').checked;
      log("[INFO] Settings updated from UI: " + JSON.stringify(settings));
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateSettingsFromUI();
    });

    function updateUIFromSettings() {
      document.getElementById('saveFile').value = settings.save_file;
      document.getElementById('stepFile').value = settings.step_file;
      document.getElementById('positionsTxt').value = settings.PositionsTxt;
      document.getElementById('savePixelsX').value = settings.save_pixels_x;
      document.getElementById('savePixelsY').value = settings.save_pixels_y;
      document.getElementById('searchPercentBox').value = settings.search_percent;
      document.getElementById('whiteSensitivityBox').value = settings.white_sensitivity;
      document.getElementById('stepRequired').checked = settings.StepRequired;
    }

    document.querySelectorAll('#saveFile,#stepFile,#positionsTxt,#savePixelsX,#savePixelsY,#searchPercentBox,#whiteSensitivityBox,#stepRequired')
      .forEach(el => el.addEventListener('input', updateSettingsFromUI));

    document.getElementById('settingsInput').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        const js = JSON.parse(text);
        Object.assign(settings, js);
        log("[INFO] Settings loaded: " + JSON.stringify(settings));
        updateUIFromSettings();
      } catch (err) {
        log("[ERROR] Failed to parse settings.json");
      }
    });

    document.getElementById('loadBtn').addEventListener('click', async () => {
      if (!cvReady) { log("[ERROR] OpenCV not ready yet. Please check path or import file manually."); return; }
      const file = document.getElementById('fileInput').files[0];
      if (!file) { log("[ERROR] No file selected."); return; }
      log("[INFO] Loading " + file.name);
      imgMat = await loadCvMatFromFile(file);
      clicks = [];
      redrawCanvas();
      log("[INFO] Image ready. Tap or click 4 corners (LT, RT, RB, LB).");
    });

    canvas.addEventListener('pointerdown', e => {
      if (!imgMat) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const ix = Math.round((x - offsetX) / scale);
      const iy = Math.round((y - offsetY) / scale);
      clicks.push({ x: ix, y: iy });
      log(`[INFO] Pointer ${clicks.length}/4 display=(${x},${y}) -> image=(${ix},${iy})`);
      redrawCanvas();
      if (clicks.length === 4) {
        log("[INFO] 4 points clicked. Refining corners...");
        refineAndTransform();
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!alignedMat) { log("[ERROR] No aligned image yet."); return; }
      matToBlob(alignedMat).then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = settings.save_file + ".png";
        a.click();
        URL.revokeObjectURL(url);
        log("[INFO] Final aligned image downloaded.");

        if (settings.StepRequired) {
          const stepCanvas = document.createElement('canvas');
          stepCanvas.width = canvas.width;
          stepCanvas.height = canvas.height;
          const stepCtx = stepCanvas.getContext('2d');
          redrawCanvas();
          stepCtx.drawImage(canvas, 0, 0);

          stepCtx.strokeStyle = "blue";
          stepCtx.lineWidth = 2;
          for (const p of refinedPoints) {
            const dx = p.x * scale + offsetX;
            const dy = p.y * scale + offsetY;
            stepCtx.beginPath();
            stepCtx.moveTo(dx - 6, dy - 6);
            stepCtx.lineTo(dx + 6, dy + 6);
            stepCtx.moveTo(dx + 6, dy - 6);
            stepCtx.lineTo(dx - 6, dy + 6);
            stepCtx.stroke();
          }

          stepCanvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = settings.step_file + ".png";
            a.click();
            URL.revokeObjectURL(url);
            log("[INFO] Step image with overlays + refined X marks downloaded.");
          }, 'image/png');

          const posText = refinedPoints.map((p, i) => `P${i + 1}: ${p.x},${p.y}`).join("\n");
          const blob = new Blob([posText], { type: "text/plain" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = settings.PositionsTxt + ".txt";
          a.click();
          URL.revokeObjectURL(url);
          log("[INFO] Positions text downloaded.");
        }
      });
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!alignedMat) {
        log("[ERROR] No aligned image yet.");
        return;
      }

      const status = document.getElementById('copyStatus');
      status.textContent = "Copying to clipboard...";

      try {
        const blob = await matToBlob(alignedMat);
        const item = new ClipboardItem({ "image/png": blob });
        await navigator.clipboard.write([item]);

        log("[INFO] Aligned image copied to clipboard.");
        status.textContent = "✅ Done! Photo copy to clipboard.";
      } catch (err) {
        log("[ERROR] Failed to copy to clipboard: " + err);
        status.textContent = "❌ Copy failed.";
      }
    });

    document.getElementById('copyDataUrlBtn').addEventListener('click', async () => {
      if (!alignedMat) {
        log("[ERROR] No aligned image yet.");
        const status = document.getElementById('copyStatus');
        if (status) status.textContent = "❌ No aligned image yet.";
        return;
      }

      const status = document.getElementById('copyStatus');
      if (status) status.textContent = "Copying...";

      const blob = await matToBlob(alignedMat, "jpeg", 0.7);
      const reader = new FileReader();
      reader.onloadend = async () => {
        const dataUrl = reader.result;
        try {
          await navigator.clipboard.writeText(dataUrl);
          if (status) status.textContent = "✅ Done! Data URL copied.";
          log("[INFO] Data URL copied to clipboard.");
        } catch (err) {
          if (status) status.textContent = "⚠️ Clipboard blocked.";
          log("[ERROR] Clipboard blocked. Could not copy data URL.");
        }
      };
      reader.readAsDataURL(blob);
    });

    async function loadCvMatFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          log(`[INFO] Decoded image size: ${image.width}x${image.height}`);
          const c = document.createElement('canvas');
          c.width = image.width; c.height = image.height;
          const tempCtx = c.getContext('2d');
          tempCtx.drawImage(image, 0, 0);

          const imgData = tempCtx.getImageData(0, 0, c.width, c.height);
          const data = imgData.data;
          const width = c.width;
          const height = c.height;

          const gray = new Uint8ClampedArray(width * height);
          for (let i = 0; i < data.length; i += 4) {
            gray[i / 4] = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
          }

          const tParam = parseFloat(document.getElementById('whiteSensitivityBox').value) || 100;
          const blockSize = Math.max(16, Math.floor(Math.min(width, height) / 12));
          const bgLightness = new Uint8ClampedArray(width * height);

          for (let y = 0; y < height; y += blockSize) {
            for (let x = 0; x < width; x += blockSize) {
              let maxVal = 0;
              const rMax = Math.min(y + blockSize, height);
              const cMax = Math.min(x + blockSize, width);

              for (let by = y; by < rMax; by++) {
                for (let bx = x; bx < cMax; bx++) {
                  const val = gray[by * width + bx];
                  if (val > maxVal) maxVal = val;
                }
              }
              for (let by = y; by < rMax; by++) {
                for (let bx = x; bx < cMax; bx++) {
                  bgLightness[by * width + bx] = maxVal;
                }
              }
            }
          }

          for (let i = 0; i < data.length; i += 4) {
            const idx = i / 4;
            const currentGray = gray[idx];
            const localBg = bgLightness[idx];

            let ratio = localBg > 0 ? (currentGray / localBg) : 1.0;
            const adaptiveCutoff = 1.0 - (tParam / 220);

            if (ratio > adaptiveCutoff) {
              data[i] = 255;
              data[i + 1] = 255;
              data[i + 2] = 255;
            }
          }
          tempCtx.putImageData(imgData, 0, 0);

          const id = tempCtx.getImageData(0, 0, c.width, c.height);
          const mat = cv.matFromImageData(id);
          URL.revokeObjectURL(url);
          resolve(mat);
        };
        image.onerror = () => { log("[ERROR] Failed to decode image."); reject(); };
        image.src = url;
      });
    }

    function drawImage(mat) {
      const w = mat.cols, h = mat.rows;
      scale = Math.min(canvas.width / w, canvas.height / h);
      const scaledW = Math.round(w * scale), scaledH = Math.round(h * scale);
      offsetX = (canvas.width - scaledW) / 2;
      offsetY = (canvas.height - scaledH) / 2;
      let rgba = new cv.Mat();
      cv.cvtColor(mat, rgba, cv.COLOR_BGR2RGBA);
      let id = new ImageData(new Uint8ClampedArray(rgba.data), w, h);
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      let tmp = document.createElement('canvas'); tmp.width = w; tmp.height = h;
      tmp.getContext('2d').putImageData(id, 0, 0);
      ctx.drawImage(tmp, 0, 0, w, h, offsetX, offsetY, scaledW, scaledH);
      rgba.delete();
    }

    function redrawCanvas() {
      if (!imgMat) return;
      drawImage(imgMat);
      ctx.fillStyle = "red";
      for (const p of clicks) {
        const dx = p.x * scale + offsetX;
        const dy = p.y * scale + offsetY;
        ctx.beginPath();
        ctx.arc(dx, dy, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      const percent = settings.search_percent / 100.0;
      const searchRadius = Math.round(percent * Math.max(imgMat.cols, imgMat.rows));
      ctx.strokeStyle = "darkgreen";
      ctx.lineWidth = 2;
      for (const p of clicks) {
        const dx = p.x * scale + offsetX;
        const dy = p.y * scale + offsetY;
        const r = searchRadius * scale;
        ctx.strokeRect(dx - r, dy - r, 2 * r, 2 * r);
      }
    }

    function refineAndTransform() {
      let gray = new cv.Mat();
      cv.cvtColor(imgMat, gray, cv.COLOR_RGBA2GRAY);
      let thresh = new cv.Mat();
      cv.threshold(gray, thresh, 50, 255, cv.THRESH_BINARY_INV);
      gray.delete();

      refinedPoints = [];
      const imgW = thresh.cols, imgH = thresh.rows;
      const percent = settings.search_percent / 100.0;
      const searchRadius = Math.round(percent * Math.max(imgW, imgH));
      log(`[INFO] Refining with search radius ${searchRadius}px`);
      for (let i = 0; i < clicks.length; i++) {
        const px = clicks[i].x, py = clicks[i].y;
        const x1 = Math.max(px - searchRadius, 0), y1 = Math.max(py - searchRadius, 0);
        const x2 = Math.min(px + searchRadius, imgW), y2 = Math.min(py + searchRadius, imgH);
        const roi = thresh.roi(new cv.Rect(x1, y1, x2 - x1, y2 - y1));
        let contours = new cv.MatVector(), hier = new cv.Mat();
        cv.findContours(roi, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        if (contours.size() > 0) {
          let maxIdx = 0, maxArea = 0;
          for (let k = 0; k < contours.size(); k++) {
            const r = cv.boundingRect(contours.get(k));
            const area = r.width * r.height;
            if (area > maxArea) { maxArea = area; maxIdx = k; }
          }
          const rect = cv.boundingRect(contours.get(maxIdx));
          const bx = x1 + rect.x, by = y1 + rect.y, bw = rect.width, bh = rect.height;
          if (i === 0) refinedPoints.push({ x: bx, y: by });
          else if (i === 1) refinedPoints.push({ x: bx + bw, y: by });
          else if (i === 2) refinedPoints.push({ x: bx + bw, y: by + bh });
          else if (i === 3) refinedPoints.push({ x: bx, y: by + bh });
        } else {
          refinedPoints.push({ x: px, y: py });
        }
        roi.delete(); contours.delete(); hier.delete();
      }

      log("[INFO] Refined points: " + JSON.stringify(refinedPoints));
      let bgr = new cv.Mat();
      cv.cvtColor(imgMat, bgr, cv.COLOR_RGBA2BGR);
      alignedMat = new cv.Mat();
      const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
        refinedPoints[0].x, refinedPoints[0].y,
        refinedPoints[1].x, refinedPoints[1].y,
        refinedPoints[2].x, refinedPoints[2].y,
        refinedPoints[3].x, refinedPoints[3].y
      ]);
      const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
        0, 0,
        bgr.cols, 0,
        bgr.cols, bgr.rows,
        0, bgr.rows
      ]);
      const M = cv.getPerspectiveTransform(srcPts, dstPts);
      cv.warpPerspective(bgr, alignedMat, M, new cv.Size(bgr.cols, bgr.rows));

      if (settings.save_pixels_x > 0 && settings.save_pixels_y > 0) {
        let resized = new cv.Mat();
        cv.resize(alignedMat, resized, new cv.Size(settings.save_pixels_x, settings.save_pixels_y));
        alignedMat.delete();
        alignedMat = resized;
        log(`[INFO] Output resized to ${settings.save_pixels_x}x${settings.save_pixels_y}`);
      }

      log("[INFO] Perspective transform complete. Showing aligned image.");
      drawImage(alignedMat);
      document.getElementById('downloadBtn').disabled = false;
      document.getElementById('copyBtn').disabled = false;
      document.getElementById('copyDataUrlBtn').disabled = false;
      document.getElementById('saveCookieBtn').disabled = false; // 新增這行：解禁儲存按鈕

      srcPts.delete();
      dstPts.delete(); M.delete(); bgr.delete(); thresh.delete();
    }

    function matToBlob(mat) {
      let rgba = new cv.Mat();
      cv.cvtColor(mat, rgba, cv.COLOR_BGR2RGBA);
      const c = document.createElement('canvas');
      c.width = rgba.cols;
      c.height = rgba.rows;
      const ctx2 = c.getContext('2d');
      ctx2.putImageData(new ImageData(new Uint8ClampedArray(rgba.data), rgba.cols, rgba.rows), 0, 0);
      rgba.delete();
      return new Promise(resolve => c.toBlob(resolve, 'image/png'));
    }

    // 【新增】開啟資料庫的通用函式
    async function getDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open("ScannerDB", 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("images")) {
            db.createObjectStore("images", { keyPath: "id" });
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    // 【替換】Save 按鈕邏輯：直接存 Blob，不轉 Base64
    document.getElementById('saveCookieBtn').addEventListener('click', async () => {
      if (!alignedMat) { log("[ERROR] No image to save."); return; }
      const status = document.getElementById('copyStatus');
      status.textContent = "Saving to DB...";

      try {
        const blob = await matToBlob(alignedMat);
        const db = await getDB();
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").put({ id: "saved_photo", data: blob });

        tx.oncomplete = () => {
          status.textContent = "✅ Done! Photo saved to DB.";
          log("[SUCCESS] Image saved to IndexedDB.");
        };
      } catch (err) {
        status.textContent = "❌ Save failed.";
        log("[ERROR] DB storage failed: " + err);
      }
    });

    // 【替換】Clear 按鈕邏輯：刪除資料庫項目
    document.getElementById('clearCookieBtn').addEventListener('click', async () => {
      const status = document.getElementById('copyStatus');
      try {
        const db = await getDB();
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").delete("saved_photo");

        tx.oncomplete = () => {
          status.textContent = "✅ Done! Database cleared.";
          log("[INFO] DB storage cleared.");
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        };
      } catch (err) {
        log("[ERROR] Clear failed: " + err);
      }
    });
  </script>
</body>
