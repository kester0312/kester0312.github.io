<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test MC Box Fill</title>
<style>
  body {
    font-family: system-ui;
    margin: 0;
  }
  #controls {
    padding: 10px;
    background: #f5f7fb;
    border-bottom: 1px solid #ccc;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  canvas {
    border: 1px solid #ccc;
    background: #fff;
    touch-action: none;
  }
  textarea {
    width: 100%;
    height: 120px;
  }
  .btn {
    padding: 6px 10px;
    border: 1px solid #888;
    background: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="controls">
  <input id="fileInput" type="file" accept="image/png">
  <button id="loadBtn" class="btn">Load</button>
  <label>Zoom:</label>
  <input id="zoom" type="range" min="0.5" max="6" step="0.1" value="1">
  <span id="zoomVal">1.0×</span>
  <button id="resetPan" class="btn">Center</button>
  <label>Margin %:</label>
  <input id="marginPct" type="number" value="0.7" step="0.5">
  <label>Fill threshold:</label>
  <input id="fillThresh" type="number" value="0.3" step="0.05">
  <button id="runBtn" class="btn">Run Test</button>
  <button id="importBtn" class="btn">Import</button>
</div>
<canvas id="canvas" width="1000" height="700"></canvas>
<textarea id="output"></textarea>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let imgBitmap = null, iw = 0, ih = 0;
let zoomFactor = 1.0, panX = 0, panY = 0;
let selections = [], dragPanning = false, lastPointer = null;

// conversions between canvas and image coordinates
function canvasToImage(x, y) {
  return { xImg: (x - panX) / zoomFactor, yImg: (y - panY) / zoomFactor };
}
function imageToCanvas(xImg, yImg) {
  return { xCanvas: xImg * zoomFactor + panX, yCanvas: yImg * zoomFactor + panY };
}

// draw base image and any selection overlays
function drawBase() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (imgBitmap) {
    ctx.setTransform(zoomFactor, 0, 0, zoomFactor, panX, panY);
    ctx.drawImage(imgBitmap, 0, 0, iw, ih);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
  for (const s of selections) {
    const p = imageToCanvas(s.xImg, s.yImg);
    ctx.strokeStyle = "#ff3b30";
    ctx.strokeRect(p.xCanvas, p.yCanvas, s.wImg * zoomFactor, s.hImg * zoomFactor);
  }
}
// helper: detect dark frame box inside a region
function findBoxFromFrame(data, W, H) {
  let top = -1, bottom = -1, left = -1, right = -1;

  // scan rows
  for (let y = 0; y < H; y++) {
    let dark = 0;
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const lum = 0.2126 * data[idx] + 0.7152 * data[idx+1] + 0.0722 * data[idx+2];
      if (lum < 200) dark++;
    }
    if (dark > W * 0.25) { if (top === -1) top = y; bottom = y; }
  }

  // scan columns
  for (let x = 0; x < W; x++) {
    let dark = 0;
    for (let y = 0; y < H; y++) {
      const idx = (y * W + x) * 4;
      const lum = 0.2126 * data[idx] + 0.7152 * data[idx+1] + 0.0722 * data[idx+2];
      if (lum < 200) dark++;
    }
    if (dark > H * 0.25) { if (left === -1) left = x; right = x; }
  }

  if (top >= 0 && bottom >= 0 && left >= 0 && right >= 0) {
    return { x: left, y: top, w: right - left, h: bottom - top };
  }
  return null;
}

// test a single selection
function testBox(sel) {
  const marginPct = parseFloat(document.getElementById('marginPct').value||"0")/100;
  const fillThresh = parseFloat(document.getElementById('fillThresh').value||"0.3");

  const tmp = document.createElement('canvas');
  tmp.width = iw; tmp.height = ih;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(imgBitmap, 0, 0, iw, ih);

  const marginX = Math.round(iw * marginPct);
  const marginY = Math.round(ih * marginPct);
  const zone = {
    x: Math.max(0, sel.xImg - marginX),
    y: Math.max(0, sel.yImg - marginY),
    w: sel.wImg + 2*marginX,
    h: sel.hImg + 2*marginY
  };

  // visualize guess frame range
  const zoneP = imageToCanvas(zone.x, zone.y);
  ctx.strokeStyle = "#3498db";
  ctx.strokeRect(zoneP.xCanvas, zoneP.yCanvas, zone.w*zoomFactor, zone.h*zoomFactor);

  const id = tctx.getImageData(zone.x, zone.y, zone.w, zone.h);
  const box = findBoxFromFrame(id.data, zone.w, zone.h);
  if (!box) { document.getElementById('output').value += "No frame detected\n"; return; }

  const absX = zone.x + box.x, absY = zone.y + box.y;
  const targetW = box.w, targetH = box.h;

  const midW = Math.max(1, Math.floor(targetW*0.4));
  const midH = Math.max(1, Math.floor(targetH*0.4));
  const midX = absX + Math.floor((targetW-midW)/2);
  const midY = absY + Math.floor((targetH-midH)/2);

  const roi = tctx.getImageData(midX, midY, midW, midH);
  const d = roi.data;
  let total = midW * midH;
  let sumLum = 0;

  // average luminance
  for (let i=0;i<d.length;i+=4){
    const lum=0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2];
    sumLum+=lum;
  }
  const avgLum=sumLum/total;

  // count dark or colored pixels
  let dark=0;
  for (let i=0;i<d.length;i+=4){
    const r=d[i], g=d[i+1], b=d[i+2];
    const lum=0.2126*r+0.7152*g+0.0722*b;
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    const sat=(max-min)/(max||1);
    if(lum<avgLum*0.85 || sat>0.4) dark++;
  }
  const ratio=dark/total;
  const filled=ratio>=fillThresh;

  // overlays
  const p=imageToCanvas(absX,absY);
  ctx.strokeStyle=filled?"#2ecc71":"#e67e22";
  ctx.strokeRect(p.xCanvas,p.yCanvas,targetW*zoomFactor,targetH*zoomFactor);

  const midP=imageToCanvas(midX,midY);
  ctx.strokeStyle="#9b59b6";
  ctx.strokeRect(midP.xCanvas,midP.yCanvas,midW*zoomFactor,midH*zoomFactor);

  document.getElementById('output').value += `Sel (${sel.xImg},${sel.yImg}): ratio=${ratio.toFixed(2)} filled=${filled}\n`;
}

// load image
document.getElementById('loadBtn').onclick = async () => {
  const f = document.getElementById('fileInput').files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = async () => {
    imgBitmap = await createImageBitmap(img);
    iw = img.width; ih = img.height;
    drawBase();
    URL.revokeObjectURL(url);
  };
  img.src = url;
};

// zoom slider
document.getElementById('zoom').oninput = e => {
  const prevZoom = zoomFactor;
  zoomFactor = parseFloat(e.target.value);
  document.getElementById('zoomVal').textContent = zoomFactor.toFixed(1)+"×";
  const cx=canvas.width/2, cy=canvas.height/2;
  panX = cx - (cx - panX)*(zoomFactor/prevZoom);
  panY = cy - (cy - panY)*(zoomFactor/prevZoom);
  drawBase();
};

// reset pan
document.getElementById('resetPan').onclick = () => {
  panX = (canvas.width - iw*zoomFactor)/2;
  panY = (canvas.height - ih*zoomFactor)/2;
  drawBase();
};

// drag/pan
canvas.addEventListener('pointerdown', e => {
  if (e.button===1 || e.button===2) {
    const r=canvas.getBoundingClientRect();
    lastPointer={x:e.clientX-r.left,y:e.clientY-r.top};
    dragPanning=true;
  }
  e.preventDefault();
});
canvas.addEventListener('pointermove', e => {
  if (dragPanning && lastPointer) {
    const r=canvas.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    const dx=x-lastPointer.x,dy=y-lastPointer.y;
    panX+=dx; panY+=dy;
    lastPointer={x,y};
    drawBase();
  }
});
canvas.addEventListener('pointerup', ()=>{dragPanning=false;lastPointer=null;});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// import positions
document.getElementById('importBtn').onclick = async () => {
  const text = await navigator.clipboard.readText();
  document.getElementById('output').value = text;
  selections=[];
  text.split(/\n/).forEach(line=>{
    const parts=line.match(/(-?\d+)/g);
    if(parts&&parts.length>=4){
      let [x,y,w,h]=parts.map(Number);
      selections.push({xImg:x,yImg:y,wImg:Math.abs(w),hImg:Math.abs(h)});
    }
  });
  drawBase();
};

// run test
document.getElementById('runBtn').onclick = () => {
  drawBase();
  selections.forEach(sel=>testBox(sel));
};
</script>
</body>
</html>
