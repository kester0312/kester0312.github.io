<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MC Paper System</title>
    <style>
        /* --- 1. GLOBAL LAYOUT --- */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .viewport {
            flex: 1;
            overflow: auto;
            background: #1a1a1a;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        canvas {
            background: white;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            transform-origin: top center;
            cursor: crosshair;
        }

        #hoverCoord {
            position: fixed;
            background: #000;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
            font-size: 11px;
            z-index: 1000;
            display: none;
        }

        .sidebar {
            left: 0;
            top: 0;
            bottom: 0;
            width: 450px;
            min-width: 300px;
            max-width: 80vw;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            z-index: 100;
            border-right: 6px solid #1a252f;
            position: relative;
            user-select: none;

            /* 1. REMOVE the cursor from here so the middle area uses normal pointer rules */
            /* cursor: col-resize; */
        }

        /* 2. ADD this rule directly underneath to make a precise right-edge interactive trigger zone */
        .sidebar::after {
            content: "";
            position: absolute;
            top: 0;
            right: -6px;
            /* Sits perfectly right over your 6px border */
            bottom: 0;
            width: 12px;
            /* Makes a comfortable, invisible 12px wide hover zone */
            cursor: col-resize;
            /* ONLY shows the <|> resize icon here! */
            z-index: 999;
        }

        /* Optional: Keep your nice hover glow effect */
        .sidebar:hover {
            border-right-color: #1d5377;
        }

        .sidebar:hover {
            border-right-color: #1d5377;
            /* Glows blue when you hover near the edge */
        }

        .header {
            padding: 15px 20px;
            background: #2c3e50;
            color: white;
        }

        .probe-panel {
            background: #1a252f;
            color: #ecf0f1;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            font-family: monospace;
            border-left: 5px solid #3498db;
        }

        .probe-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin: 2px 0;
        }

        .probe-row .val {
            color: #f1c40f;

        }

        /* --- 3. CONTROLS & INPUTS --- */
        .controls {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Adds nice spacing between your sliders */
            overflow-y: auto;
            /* Adds a scrollbar if your screen is too small */
        }

        .input-group-row {
            display: flex;
            gap: 8px;
        }

        .btn-paste {
            background: #8e44ad;
            flex: 1;

        }



        .btn-answer {
            background: #d35400;

            border: none;
            border-radius: 4px;
            padding: 8px 0;
            font-weight: bold;

        .file-label {
            flex: 1;

        /* Update this existing style */

        }

        /* Add this new style directly below it */
        .dropdown-select {

            background: #34495e;

            border-radius: 4px;

        .stats-container {

            margin-bottom: 25px;
            background: #fff;
            padding: 5px;
            overflow-x: auto;

            font-weight: 800;

        /* --- 7. TOGGLE SWITCH --- */
        .personal-switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }

        .personal-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* 1. Inactive State (Keep a neutral color like light grey or light blue) */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            /* Changed to grey to make the Blue 'On' pop */
            transition: .1s;
            border-radius: 20px;
            border: 1px solid #fff;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 2px;
            background-color: white;
            transition: .1s;
            border-radius: 50%;
        }

        /* 2. Active State (CHANGE THIS TO BLUE) */
        input:checked+.slider {
            background-color: #3498db;
            /* Professional Blue */
        }

        /* 3. Movement (Keep this as is) */
        input:checked+.slider:before {
            transform: translateX(18px);
        }

        .bubble-item.is-other-filled {
            background-color: #f6e05e !important;
            /* Yellow */
            border-color: #ecc94b !important;
            color: #744210 !important;
        }

        /* Normal state hover */
        .btn-reset:hover {
            background-color: #edf2f7;
        }

        /* Optional: If you want a specific red-hover when it's modified */
        .btn-reset[style*="background-color: rgb(245, 101, 101)"]:hover {
            background-color: #e53e3e !important;
            /* Slightly darker red */
        }




        /* Ensure the area where the table was remains white */
        body {

            margin: 0;
            padding: 0;
        }

            display: flex;

        }

        /* The area containing your canvas and controls */
        .control-panel {

            background: #f7fafc;

        }

        /* When the switch is Blue (Checked) */
        .personal-switch input:checked+.slider {
            background-color: #3498db;
            /* Blue color */
        }

        /* Style for the joined text result */
        .condensed-val {

        /* Ensure the label and value sit nicely together */
        .q-row {
            display: flex;

            border-bottom: 1px solid #eee;
        }

        /* Style for the Condensed Text */
        .condensed-val {
            font-family: 'Courier New', monospace;

        }

        /* The Switch Style */

        }

        /* Hide background table properly when modal is open */

            display: none !important;
        }

        #canvas-wrapper {
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            /* This makes the children go horizontal */
            flex-direction: row;
            /* This is the default, but good to know */

        .box {

            align-items: center;
            /* Aligns content vertically in the middle */
            justify-content: center;
            /* Aligns content horizontally in the center (optional) */

        }

        /* New style for the correct answer's border */
        /* New style for the correct answer's border */

            /* 1. Keep the physical border at 1px so the layout height NEVER changes */
            border: 1px solid #2ecc71 !important;

            /* 2. Use box-shadow to add an extra 1px visual depth (making it look 2px thick) */

        }

        /* Ensure the border doesn't shift layout */

    <div id="modalOverlay">
        <div id="resultsModal">
            <div class="modal-header">
                <h2 style="margin:0; font-size: 1.1em; color: #2c3e50;">MC Analyze</h2>
                <button class="close-btn" onclick="toggleModal(false)">Close</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="hoverCoord">0.00, 0.00</div>

    <div class="sidebar">
        <a class="container" href="../../index.html" class="logo" title="麥塊藍月光">
            <img src="../../favicon.ico" width=50 alt="Logo">
            <h3 style="margin:0;color: #ffffff;" class="box">MC Paper System</h3>
        </a>

        <div class="probe-panel">
            <div style="font-size: 0.7em; color: #bdc3c7; margin-bottom: 5px;">LIVE POINT SENSOR:</div>
            <div class="probe-row"><span>JSON Pos:</span> <span id="pCoord" class="val">0.00, 0.00</span></div>
            <div class="probe-row"><span>Darkness:</span> <span id="pDark" class="val">--</span></div>
        </div>

        <div class="controls">
            <div class="input-group-row">
                <button class="btn-paste" onclick="pasteImage()">📋 PASTE CLIPBOARD</button>
                <label class="file-label">📁 OPEN IMAGE<input type="file" id="upload" accept="image/*"></label>
            </div>
            <div class="input-group-row">
                <label class="json-label">📄 IMPORT JSON<input type="file" id="jsonInput" accept=".json"></label>
                <select id="layoutDropdown" class="dropdown-select">
                    <option value="Custom" disabled>Custom json</option>
                </select>
            </div>

            <button class="btn-answer" onclick="pasteAnswerKey()">🎯 PASTE ANSWER KEY</button>

            <div class="setting-row"><span>Zoom: <b id="zoomLabel">100</b>%</span><input type="range" id="zoomRange"
                    min="10" max="200" value="100"></div>
            <div class="setting-row"><span>Search: <b id="searchLabel">4</b>%</span><input type="range" id="searchRange"
                    min="1" max="15" value="4"></div>
            <div class="setting-row"><span>Darkness: <b id="inkLabel">20</b>%</span><input type="range"
                    id="inkThreshold" min="1" max="100" value="20"></div>
            <div class="setting-row"><span>Box: <b id="sizeLabel">0.50</b>x</span><input type="range" id="sizeRange"
                    min="0.05" max="1.0" step="0.01" value="0.50"></div>

            <button onclick="processAllGroups()">🔄 RE-SCAN SHEET</button>
            <button style="background:#27ae60" onclick="toggleModal(true)">📊 VIEW RESULTS</button>
        </div>
        <div id="resultsTable" class="results-container"></div>
    </div>

    <div class="viewport"><canvas id="canvas"></canvas></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const resultsTable = document.getElementById('resultsTable');
        const modalBody = document.getElementById('modalBody');
        const modalOverlay = document.getElementById('modalOverlay');
        const hoverTip = document.getElementById('hoverCoord');
        let originalImg = null, configData = null;
        let answerKey = [];

        let mcStats = { correct: 0, wrong: 0, multiple: 0, blank: 0, total: 0, excluded: 0 };

        let isPrivacyChecked = false; // MUST be at the top of your <script>
        async function pasteAnswerKey() {
            let text = "";
            try {
                // Try automatic clipboard first
                text = await navigator.clipboard.readText();
            } catch (err) {
                // Fallback to manual prompt if blocked
                text = window.prompt("Clipboard blocked. Please paste your Answer Key (e.g. A|B|C) here:");
            }

            if (text && text.trim().length > 0) {
                answerKey = text.split('|').map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
                processAllGroups();
            }
        }

        async function pasteImage() {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    // Handle actual Image files
                    if (item.types.some(t => t.startsWith('image/'))) {
                        const type = item.types.find(t => t.startsWith('image/'));
                        const blob = await item.getType(type);
                        loadImage(URL.createObjectURL(blob));
                        return;
                    }
                    // Handle Image Data URLs copied as text
                    if (item.types.includes('text/plain')) {
                        const text = await (await item.getType('text/plain')).text();
                        if (text.trim().startsWith('data:image')) {
                            loadImage(text.trim());
                            return;
                        }
                    }
                }
            } catch (err) {
                // Fallback: Ask user to paste the Data URL manually
                const manualLink = window.prompt("Clipboard error. Please paste the Image URL or Base64 Data String here:");
                if (manualLink && manualLink.trim().startsWith('data:image')) {
                    loadImage(manualLink.trim());
                } else if (manualLink) {
                    alert("Invalid image data format.");
                }
            }
        }

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            files.forEach(file => {
                if (file.type.startsWith('image/')) loadImage(URL.createObjectURL(file));
                else if (file.name.endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = (f) => loadJSON(f.target.result);
                    reader.readAsText(file);
                }
            });
        });

        function loadImage(src) {
            originalImg = new Image();
            originalImg.onload = () => {
                canvas.width = originalImg.width;
                canvas.height = originalImg.height;
                ctx.drawImage(originalImg, 0, 0);

                // --- NEW AUTO-ZOOM LOGIC START ---
                // 1. Find the container (assuming it's the parent of your canvas)
                const container = canvas.parentElement;
                const padding = 40; // Space to leave around the edges

                // 2. Calculate the ratio
                const availableW = container.clientWidth - padding;
                const availableH = container.clientHeight - padding;

                const ratioW = availableW / originalImg.width;
                const ratioH = availableH / originalImg.height;

                // 3. Pick the smaller ratio and cap at 100% (1.0)
                let autoZoom = Math.min(ratioW, ratioH);
                if (autoZoom > 1) autoZoom = 1;

                // 4. Apply to your slider and canvas
                const zoomSlider = document.getElementById('zoomRange');
                if (zoomSlider) {
                    const zoomPercent = Math.round(autoZoom * 100);
                    zoomSlider.value = zoomPercent;
                    // Update the label if you have one
                    const zoomLabel = document.getElementById('zoomLabel');
                    if (zoomLabel) zoomLabel.innerText = zoomPercent;

                    // Apply the actual CSS transform
                    canvas.style.transform = `scale(${autoZoom})`;
                }
                // --- NEW AUTO-ZOOM LOGIC END ---

                processAllGroups();
            };
            originalImg.src = src;
        }
        function loadJSON(str) {
            try {
                configData = JSON.parse(str);

                // Force dropdown to show Custom json status
                const dropdown = document.getElementById('layoutDropdown');
                if (dropdown) dropdown.value = 'Custom';

                // FIX: Clear the upload input cache right after parsing succeeds
                const fileInput = document.getElementById('upload');
                if (fileInput) fileInput.value = '';

                if (configData.Setting) {
                    updateSlider('searchRange', configData.Setting.Search_Area || 4);
                    updateSlider('inkThreshold', configData.Setting.Ink_Threshold || 20);
                    updateSlider('sizeRange', configData.Setting.Box_Scale || 0.5);
                }
                processAllGroups();
            } catch (e) {
                alert("Invalid JSON file.");
            }
        }
        function toggleModal(show) {
            const backgroundTable = document.getElementById('resultsTable');

            if (show) {
                // Force a recalculation so manual clicks are counted before the modal opens
                recalculateMCStats();

                const totalDenom = mcStats.total || 1;
                const corrPct = (mcStats.correct / totalDenom * 100).toFixed(1);
                const wrongPct = ((mcStats.wrong + mcStats.multiple + mcStats.blank) / totalDenom * 100).toFixed(1);
                const wrongExPct = (mcStats.wrong / totalDenom * 100).toFixed(1);

                modalBody.innerHTML = `

        function analyze(absX, absY) {
            const sArea = parseFloat(document.getElementById('searchRange').value) / 100;
            const sR = Math.min(canvas.width, canvas.height) * sArea;
            const bD = ctx.getImageData(Math.max(0, absX - sR), Math.max(0, absY - sR), sR * 2, sR * 2);
            let x1 = Infinity, x2 = -Infinity, y1 = Infinity, y2 = -Infinity, f = false;
            for (let i = 0; i < bD.data.length; i += 4) {
                if ((bD.data[i] + bD.data[i + 1] + bD.data[i + 2]) / 3 < 80) {
                    const x = (i / 4) % bD.width, y = Math.floor((i / 4) / bD.width);
                    x1 = Math.min(x1, x); x2 = Math.max(x2, x); y1 = Math.min(y1, y); y2 = Math.max(y2, y); f = true;
                }
            }
            const bx = f ? (absX - sR + x1) : absX - 12, by = f ? (absY - sR + y1) : absY - 12;
            const bw = f ? (x2 - x1) : 24, bh = f ? (y2 - y1) : 24;
            const sc = parseFloat(document.getElementById('sizeRange').value);
            const sw = Math.max(1, bw * sc), sh = Math.max(1, bh * sc);
            const sx = (bx + bw / 2) - (sw / 2), sy = (by + bh / 2) - (sh / 2);

            // --- DARKNESS CALCULATION LOGIC START ---
            const samp = ctx.getImageData(sx, sy, sw, sh).data;
            let totalBrightness = 0;
            const totalPixels = samp.length / 4 || 1;

            for (let i = 0; i < samp.length; i += 4) {
                // Calculate brightness of current pixel (0 to 255)
                const brightness = (samp[i] + samp[i + 1] + samp[i + 2]) / 3;
                totalBrightness += brightness;
            }

            // Average brightness of the whole box (0 = pure black, 255 = pure white)
            const avgBrightness = totalBrightness / totalPixels;

            // Convert to darkness percentage (0% = pure white, 100% = pure black)
            const darknessRatio = (255 - avgBrightness) / 255;

            // Test against your slider threshold (e.g. slider at 20 = 20% darkness required)
            const isF = darknessRatio > (document.getElementById('inkThreshold').value / 100);
            // --- DARKNESS CALCULATION LOGIC END ---

            ctx.strokeStyle = isF ? "#2ecc71" : "#e74c3c";
            ctx.lineWidth = 2; ctx.strokeRect(sx, sy, sw, sh);

            // Return darkness ratio as 'ink' so the rest of your UI displays the darkness % properly
            return { filled: isF, ink: darknessRatio };
        }

        function recalculateMCStats() {
            mcStats = { correct: 0, wrong: 0, multiple: 0, blank: 0, total: 0, excluded: 0 };

            // Check if we are calculating from the Modal or the hidden background table
            const target = (modalOverlay.style.display === 'flex') ? modalBody : resultsTable;
            const sections = target.querySelectorAll('.log-section');

            const rows = mcSection.querySelectorAll('.q-row');
            rows.forEach((row, index) => {
                // If there's no answer key provided for this question number, exclude it
                if (index >= answerKey.length) {
                    mcStats.excluded++;

                mcStats.total++;

                // Find bubbles currently marked as 'filled' (regardless of their current color)
                const allBubbles = row.querySelectorAll('.bubble-item');
                let detectedLabels = [];

                allBubbles.forEach(b => {
                    if (b.classList.contains('is-correct') || b.classList.contains('is-wrong') || b.classList.contains('is-multiple')) {
                        detectedLabels.push(b.querySelector('span').innerText.toUpperCase());
                    }
                });

                // Update the visual colors for this row
                allBubbles.forEach(b => {
                    const bLabel = b.querySelector('span').innerText.toUpperCase();
                    const correctAnswer = answerKey[index];

                    // Clear existing logic colors
                    b.classList.remove('is-correct', 'is-wrong', 'is-multiple', 'is-answer-key');

                    // Re-apply the green border if it is the correct answer
                    if (bLabel === correctAnswer) {
                        b.classList.add('is-answer-key');
                    }

                    // Re-apply fill colors based on current selection state
                    if (detectedLabels.includes(bLabel)) {
                        if (detectedLabels.length > 1) {
                            b.classList.add('is-multiple');
                        } else if (bLabel === correctAnswer) {
                            b.classList.add('is-correct');
                        } else {
                            b.classList.add('is-wrong');
                        }
                    }
                });

                // Tally the statistics
                if (detectedLabels.length === 0) mcStats.blank++;
                else if (detectedLabels.length > 1) mcStats.multiple++;
                else if (detectedLabels[0] === answerKey[index]) mcStats.correct++;
                else mcStats.wrong++;
            });

            // If the modal is open, refresh the stat text labels immediately
            if (modalOverlay.style.display === 'flex') {
                const totalDenom = mcStats.total || 1;
                const updates = {
                    '.stat-val': [
                        mcStats.correct,
                        mcStats.wrong,
                        mcStats.multiple,
                        mcStats.blank,
                        mcStats.total,
                        mcStats.excluded,
                        (mcStats.correct / totalDenom * 100).toFixed(1) + '%',
                        ((mcStats.wrong + mcStats.multiple + mcStats.blank) / totalDenom * 100).toFixed(1) + '%',
                        (mcStats.wrong / totalDenom * 100).toFixed(1) + '%' // <-- Add this 9th item
                    ]
                };

                const cards = modalBody.querySelectorAll('.stat-val');
                cards.forEach((card, i) => {
                    if (updates['.stat-val'][i] !== undefined) {
                        card.innerText = updates['.stat-val'][i];
                    }
                });
            }
        }
        // 1. Get the elements
        const jsonInput = document.getElementById('jsonInput');
        const jsonLabel = jsonInput.parentElement; // This targets the .json-label

        // 2. Prevent the browser from just opening the file when dropped
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            jsonLabel.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        // 3. Visual feedback: Change color when hovering a file over the button
        ['dragenter', 'dragover'].forEach(eventName => {
            jsonLabel.addEventListener(eventName, () => {
                jsonLabel.style.backgroundColor = "#34495e"; // Darker blue/grey
                jsonLabel.style.border = "2px dashed #3498db";
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            jsonLabel.addEventListener(eventName, () => {
                jsonLabel.style.backgroundColor = ""; // Reset to original
                jsonLabel.style.border = "";
            }, false);
        });

        // 4. The Drop Logic
        jsonLabel.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;

            if (files.length > 0) {
                // This line "injects" the dropped file into your hidden input
                jsonInput.files = files;

                // This triggers your existing 'change' function automatically
                jsonInput.dispatchEvent(new Event('change'));

                // Optional: Update the button text to show the filename
                jsonLabel.childNodes[0].textContent = "📄 " + files[0].name;
            }
        });
        function autoFitZoom(img) {
            const container = document.getElementById('image-container'); // Your wrapper/viewport
            const displayImg = document.getElementById('display-image'); // The <img> tag

            if (!container || !img) return;

            // 1. Get dimensions
            const containerW = container.clientWidth;
            const containerH = container.clientHeight;
            const imgW = img.naturalWidth;
            const imgH = img.naturalHeight;

            // 2. Calculate ratios (with a 0.9 multiplier for a small margin)
            const widthRatio = (containerW * 0.9) / imgW;
            const heightRatio = (containerH * 0.9) / imgH;

            // 3. Pick the smaller ratio so it fits both ways
            let bestRatio = Math.min(widthRatio, heightRatio);

            // 4. Cap the zoom (e.g., don't zoom in more than 100% for tiny images)
            if (bestRatio > 1) bestRatio = 1;

            // 5. Apply the zoom
            currentZoom = bestRatio; // Assuming you have a global zoom variable
            applyZoom(); // Your existing function that updates the CSS transform/scale

            // 6. Update your UI % display if you have one
            const zoomLabel = document.getElementById('zoom-percent');
            if (zoomLabel) zoomLabel.innerText = Math.round(currentZoom * 100) + '%';
        }



        // Automatically read the folder, populate choices, and attempt to default to default.json
        function scanJsonFolder() {
            const dropdown = document.getElementById('layoutDropdown');
            if (!dropdown) return;

            fetch('pos_default_json/')
                .then(res => {
                    if (!res.ok) throw new Error("Folder 'pos_default_json' not found on server.");
                    return res.text();
                })
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const links = doc.querySelectorAll('a');

                    // Reset dropdown to use "Custom json" text as a disabled option
                    dropdown.innerHTML = '<option value="Custom" disabled>Custom json</option>';

                    let defaultPath = null;

                    links.forEach(link => {
                        const href = link.getAttribute('href');

                        if (href && href.endsWith('.json')) {
                            const fileName = decodeURIComponent(href.split('/').pop());
                            const fullPath = `pos_default_json/${fileName}`;

                            const option = document.createElement('option');
                            option.value = fullPath;

                            // Directly use the filename string (e.g., "cc.json", "Abc.json")
                            option.textContent = fileName;

                            // Insert option right above the "Custom json" option at the bottom
                            dropdown.insertBefore(option, dropdown.lastElementChild);

                            // Track if default.json is present
                            if (fileName.toLowerCase() === 'default.json') {
                                defaultPath = fullPath;
                            }
                        }
                    });

                    // If default.json exists, auto-select and load it
                    if (defaultPath) {
                        dropdown.value = defaultPath;
                        fetch(defaultPath)
                            .then(response => response.ok ? response.text() : null)
                            .then(text => {
                                if (text) {
                                    loadJSON(text);
                                    dropdown.value = defaultPath; // Keep sync
                                }
                            })
                            .catch(err => console.error("Error auto-loading default.json:", err));
                    } else {
                        dropdown.value = 'Custom';
                    }
                })
                .catch(err => {
                    console.warn("Could not read folder list. Defaulting to HTML settings:", err.message);
                    dropdown.value = 'Custom';
                });
        }
        document.getElementById('layoutDropdown').onchange = (e) => {
            const targetPath = e.target.value;
            if (targetPath === 'Custom') return;

            // FIX: Clear the file input memory so it allows fresh uploads
            const fileInput = document.getElementById('upload');
            if (fileInput) fileInput.value = '';

            fetch(targetPath)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP Error Status ${response.status}`);
                    return response.text();
                })
                .then(text => {
                    loadJSON(text);
                    document.getElementById('layoutDropdown').value = targetPath;
                })
                .catch(err => {
                    console.error(err);
                    alert("Error loading the selected config file.");
                });
        };
        // Run the directory check immediately when the page finishes rendering
        scanJsonFolder();

        // --- FULL-EDGE SIDEBAR RESIZER LOGIC ---
        const sidebar = document.querySelector('.sidebar');
        let isResizing = false;

        sidebar.addEventListener('mousedown', (e) => {
            // Get the exact position of the sidebar's right edge
            const sidebarRightEdge = sidebar.getBoundingClientRect().right;

            // Only trigger drag if the click is within 10px of the right border edge
            if (e.clientX >= sidebarRightEdge - 10 && e.clientX <= sidebarRightEdge + 5) {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            // Calculate new width based on mouse X coordinate
            let newWidth = e.clientX;

            // Enforce your min and max width constraints
            if (newWidth < 300) newWidth = 300;
            if (newWidth > window.innerWidth * 0.8) newWidth = window.innerWidth * 0.8;

            sidebar.style.width = newWidth + 'px';
        });

        window.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = ''; // Reset cursor
            }
        });
    </script>
