<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detect Pos Tool</title>
<style>
  body { font-family: sans-serif; margin:20px; }
  label { display:inline-block; width:140px; }
  .btn { padding:6px 10px; border:1px solid #888; background:#fff; cursor:pointer; }
  #posOutput { width:100%; height:120px; margin-top:10px; }
  #posAnswers { width:100%; height:80px; margin-top:10px; }
  #canvas { border:1px solid #888; background:#fff; margin-top:10px; cursor:grab; }
</style>
</head>
<body>
<script src="https://docs.opencv.org/4.x/opencv.js"></script>

<h3>Pos Fill Detection</h3>
<label>Image:</label>
<input id="fileInput" type="file" accept="image/*">
<button id="loadBtn" class="btn">Load Image</button>
<button id="importBtn" class="btn">Import Selections</button>
<br/><br/>

<label>Settings JSON:</label>
<input id="jsonInput" type="file" accept=".json">
<button id="importJsonBtn" class="btn">Import JSON</button>
<br/><br/>

<label>Margin %:</label>
<input id="marginPct" type="number" value="0.7" step="0.5"><br/>
<label>Fill threshold:</label>
<input id="fillThresh" type="number" value="0.2" step="0.05"><br/>
<label>MC Letter no.:</label>
<input id="mcGroupSize" type="number" value="4" min="2" max="8" style="width:60px;"><br/>
<label>Questions to detect:</label>
<input id="questionCount" type="number" value="1" min="1" style="width:60px;">
<button id="runBtn" class="btn">Run Test</button>
<br/><br/>

<textarea id="posOutput"></textarea>
<textarea id="posAnswers" placeholder="Formatted answers will appear here"></textarea>
<br/><br/>

<canvas id="canvas" width="1000" height="700"></canvas>

<script>
let cvReady=false;
cv.onRuntimeInitialized=()=>{cvReady=true;};

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let imgMat=null,pos_selections=[],settingsMap={};

// JSON import handler
document.getElementById('importJsonBtn').onclick = async () => {
  const file = document.getElementById('jsonInput').files[0];
  if (!file) {
    document.getElementById('posOutput').value = "No JSON file selected.";
    return;
  }
  const text = await file.text();
  try {
    settingsMap = JSON.parse(text);
    document.getElementById('posOutput').value = "Settings imported successfully.\n";
  } catch (err) {
    document.getElementById('posOutput').value = "Error parsing JSON: " + err.message;
  }
};

// Zoom+drag state
let scale=1, offsetX=0, offsetY=0, dragging=false, dragStartX=0, dragStartY=0;

// Draw image with current transform
function drawImage(mat){
  let rgba=new cv.Mat();
  cv.cvtColor(mat,rgba,cv.COLOR_BGR2RGBA);
  let id=new ImageData(new Uint8ClampedArray(rgba.data),mat.cols,mat.rows);
  const tmp=document.createElement('canvas');
  tmp.width=mat.cols; tmp.height=mat.rows;
  tmp.getContext('2d').putImageData(id,0,0);
  ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
  ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);
  ctx.drawImage(tmp,0,0);
  rgba.delete();
}
// Load image from file
async function loadCvMatFromFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const tmp=document.createElement('canvas');
        tmp.width=img.width; tmp.height=img.height;
        tmp.getContext('2d').drawImage(img,0,0);
        const imgData=tmp.getContext('2d').getImageData(0,0,img.width,img.height);
        let mat=new cv.Mat(img.height,img.width,cv.CV_8UC4);
        mat.data.set(imgData.data);
        resolve(mat);
      };
      img.onerror=()=>reject("decode error");
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('loadBtn').onclick=async()=>{
  if(!cvReady){document.getElementById('posOutput').value="OpenCV not ready.";return;}
  const file=document.getElementById('fileInput').files[0];
  if(!file){document.getElementById('posOutput').value="No file selected.";return;}
  imgMat=await loadCvMatFromFile(file);
  scale=1;offsetX=0;offsetY=0;
  drawImage(imgMat);
  document.getElementById('posOutput').value=`[INFO] Loaded ${file.name} (${imgMat.cols}x${imgMat.rows})\n`;
};

// Detection: find actual box and midpoint
function testBox(sel,index){
  const marginPct=parseFloat(document.getElementById('marginPct').value||"0")/100;
  const marginX=Math.round(imgMat.cols*marginPct);
  const marginY=Math.round(imgMat.rows*marginPct);
  const zone=new cv.Rect(
    Math.max(0,sel.xImg-marginX),
    Math.max(0,sel.yImg-marginY),
    Math.min(sel.wImg+2*marginX,imgMat.cols-sel.xImg+marginX),
    Math.min(sel.hImg+2*marginY,imgMat.rows-sel.yImg+marginY)
  );
  let roi=imgMat.roi(zone);
  let gray=new cv.Mat();cv.cvtColor(roi,gray,cv.COLOR_RGBA2GRAY);
  const mean=cv.mean(gray)[0];
  let thresh=new cv.Mat();
  cv.threshold(gray,thresh,mean*0.85,255,cv.THRESH_BINARY_INV);

  // Find contours
  let contours=new cv.MatVector(), hierarchy=new cv.Mat();
  cv.findContours(thresh,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

  let actualRect=null;
  if(contours.size()>0){
    let maxIdx=0,maxArea=0;
    for(let i=0;i<contours.size();i++){
      const r=cv.boundingRect(contours.get(i));
      const area=r.width*r.height;
      if(area>maxArea){maxArea=area;maxIdx=i;}
    }
    const r=cv.boundingRect(contours.get(maxIdx));
    actualRect={x:zone.x+r.x,y:zone.y+r.y,w:r.width,h:r.height};
  }

  const darkCount=cv.countNonZero(thresh);
  const total=roi.cols*roi.rows;
  const ratio=darkCount/total;
  const filled=ratio>=parseFloat(document.getElementById('fillThresh').value||"0.2");

  // Draw overlays
  if(actualRect){
    ctx.strokeStyle="green";ctx.lineWidth=2;
    ctx.strokeRect(actualRect.x,actualRect.y,actualRect.w,actualRect.h);
    const midX=actualRect.x+Math.floor(actualRect.w/2);
    const midY=actualRect.y+Math.floor(actualRect.h/2);
    ctx.strokeStyle="blue";ctx.lineWidth=2;
    ctx.strokeRect(midX-2,midY-2,4,4);
  }

  roi.delete();gray.delete();thresh.delete();contours.delete();hierarchy.delete();
  return filled;
}

// Interpret first 100 boxes using settingsMap
function interpretSettings(allResults, settingsMap) {
  let log = "";
  for (const [range, rule] of Object.entries(settingsMap)) {
    const [start, end] = range.split("-").map(Number);
    const slice = allResults.slice(start-1, end); // boxes are 1-indexed
    const parts = rule.split("|");
    const type = parts[0], param = parts[1], label = parts[2] || "";

    if (type === "number") {
      let digit = 0;
      slice.forEach((v,i)=>{ if(v) digit = i+1; });
      log += `${label}: ${digit}\n`;
    } else if (type === "Letter") {
      const letters = param.split("-");
      let chosen = "N";
      slice.forEach((v,i)=>{ if(v) chosen = letters[i]; });
      log += `${label}: ${chosen}\n`;
    } else if (type === "keep") {
      log += `${label||"Keep"}: ${slice.map(v=>v?"T":"F").join("")}\n`;
    }
  }
  return log;
}
// Import selections from clipboard
document.getElementById('importBtn').onclick = async () => {
  const text = await navigator.clipboard.readText();
  document.getElementById('posOutput').value = text;
  pos_selections = [];
  text.split(/\n/).forEach(line=>{
    const parts=line.match(/(-?\d+)/g);
    if(parts&&parts.length>=4){
      let [x,y,w,h]=parts.map(Number);
      pos_selections.push({xImg:x,yImg:y,wImg:Math.abs(w),hImg:Math.abs(h)});
    }
  });
};

// Format MC answers
function formatMcLetters(results,mcGroupSize){
  const letters=["A","B","C","D","E","F","G","H"];
  let out=[];
  for(let i=0;i<results.length;i+=mcGroupSize){
    const group=results.slice(i,i+mcGroupSize);
    let filledIndices=[];
    for(let j=0;j<group.length&&j<letters.length;j++){
      if(group[j])filledIndices.push(j);
    }
    let picked="N";
    if(filledIndices.length===1){picked=letters[filledIndices[0]];}
    else if(filledIndices.length>1){picked="M";}
    out.push(picked);
  }
  return out.join("|");
}

// Run detection
document.getElementById('runBtn').onclick = () => {
  if (!imgMat) { document.getElementById('posOutput').value = "No image loaded."; return; }
  drawImage(imgMat);

  const total = pos_selections.length;
  if (total === 0) { document.getElementById('posAnswers').value = "No selections imported."; return; }

  let allResults = [];
  document.getElementById('posOutput').value = "";
  for (let i = 0; i < total; i++) {
    const sel = pos_selections[i];
    const filled = testBox(sel, i);
    allResults.push(filled);
  }

  // Interpret first 100 boxes with settingsMap
  let structuredLog = "";
  if (Object.keys(settingsMap).length > 0) {
    structuredLog = interpretSettings(allResults.slice(0,100), settingsMap);
  } else {
    structuredLog = allResults.slice(0,100).map(v=>v?"T":"F").join("");
  }

  // MC answers after 100
  const mcResults = allResults.slice(100);
  const mcGroupSize = parseInt(document.getElementById('mcGroupSize').value) || 4;
  const mcString = mcResults.length > 0 ? formatMcLetters(mcResults, mcGroupSize) : "";

  let output = "";
  if (structuredLog.length > 0) output += structuredLog + "\n";
  if (mcString.length > 0) output += mcString;

  document.getElementById('posAnswers').value = output;
};

// Zoom+drag handlers
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = 1.1;
  const mouseX = e.offsetX, mouseY = e.offsetY;
  if (e.deltaY < 0) { // zoom in
    scale *= zoomFactor;
    offsetX = mouseX - (mouseX - offsetX) * zoomFactor;
    offsetY = mouseY - (mouseY - offsetY) * zoomFactor;
  } else { // zoom out
    scale /= zoomFactor;
    offsetX = mouseX - (mouseX - offsetX) / zoomFactor;
    offsetY = mouseY - (mouseY - offsetY) / zoomFactor;
  }
  drawImage(imgMat);
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStartX = e.clientX - offsetX;
  dragStartY = e.clientY - offsetY;
  canvas.style.cursor = "grabbing";
});

canvas.addEventListener('mouseup', () => {
  dragging = false;
  canvas.style.cursor = "grab";
});

canvas.addEventListener('mouseleave', () => {
  dragging = false;
  canvas.style.cursor = "grab";
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    drawImage(imgMat);
  }
});
</script>
</body>
</html>
