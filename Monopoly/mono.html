<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monopoly Cloud Bridge</title>
    <style>
        :root {
            --bg: #fffde7;
            --accent: #fbc02d;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #f5f5f5;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
            margin-right: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px; /* Prevents iOS zoom */
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-connect { background-color: #4caf50; color: white; }
        .btn-send { background-color: var(--accent); color: #333; }
        button:active { opacity: 0.7; }

        #log {
            margin-top: 20px;
            background: #222;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 10px;
            height: 200px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-bar">
            <div id="dot" class="dot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <input type="text" id="projId" placeholder="Project ID (e.g. 1000000)" value="">
        <button class="btn-connect" onclick="startConnection()">1. Start Connection</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <input type="text" id="varName" placeholder="Variable Name (No cloud symbol)" value="test">
        <input type="number" id="varValue" placeholder="Numeric Value" value="1">
        <button class="btn-send" onclick="sendUpdate()">2. Update Variable</button>
    </div>

    <div id="log">Logs will appear here...</div>

    <script>
        let ws;
        const logBox = document.getElementById('log');
        const dot = document.getElementById('dot');
        const statusText = document.getElementById('statusText');

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.textContent = `> ${msg}`;
            logBox.prepend(entry);
        }

        function startConnection() {
            const id = document.getElementById('projId').value;
            if (!id) return alert("Please enter a Project ID first!");

            if (ws) ws.close();

            // Connect to TurboWarp
            ws = new WebSocket('wss://clouddata.turbowarp.org');

            ws.onopen = () => {
                dot.style.background = '#4caf50';
                statusText.innerText = "Connected";
                addLog("Socket Open. Sending Handshake...");

                // Handshake MUST include project_id and a username
                const handshake = {
                    method: "handshake",
                    project_id: String(id),
                    user: "iPadUser_" + Math.floor(Math.random() * 999)
                };

                // CRITICAL: The \n at the end
                ws.send(JSON.stringify(handshake) + '\n');
            };

            ws.onmessage = (e) => {
                const lines = e.data.split('\n');
                lines.forEach(line => {
                    if (!line) return;
                    const data = JSON.parse(line);
                    if (data.method === "set") {
                        addLog(`Recv: ${data.name} = ${data.value}`);
                    }
                });
            };

            ws.onerror = (err) => addLog("Error: Connection failed.");
            
            ws.onclose = () => {
                dot.style.background = '#f44336';
                statusText.innerText = "Disconnected";
                addLog("Closed. Click 'Start' to reconnect.");
            };
        }

        function sendUpdate() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return addLog("Error: Connect first!");
            }

            const id = document.getElementById('projId').value;
            const name = document.getElementById('varName').value;
            const val = document.getElementById('varValue').value;

            const packet = {
                method: "set",
                project_id: String(id),
                name: "☁ " + name, // Add the cloud symbol here
                value: String(val)
            };

            ws.send(JSON.stringify(packet) + '\n');
            addLog(`Sent: ☁ ${name} = ${val}`);
        }
    </script>
</body>
</html>
